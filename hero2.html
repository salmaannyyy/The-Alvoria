<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Hero Section</title>

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Boxicons for Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        /* --- 1. CSS Variables for Easy Theming --- */
        :root {
            --color-bg: #0d0f28;
            --color-text-primary: #FFFFFF;
            --color-text-secondary: #a9aed1;
            --color-accent-light: #00ffff; /* Cyan */
            --color-accent-dark: #2c2f6d;
            --font-family: 'Poppins', sans-serif;
            --transition-speed: 0.3s;
        }

        /* --- 2. General Setup --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(45deg, var(--color-bg), var(--color-accent-dark));
            color: var(--color-text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* --- 3. Hero Section Grid Layout --- */
        .hero-section {
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            gap: 2rem;
        }

        @media (min-width: 992px) {
            .hero-section {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        /* --- 4. Content Styling --- */
        .hero-content .eyebrow {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-text-secondary);
            margin-bottom: 1rem;
        }

        .hero-content h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }
        
        .hero-content .highlight {
            color: var(--color-accent-light);
        }
        
        .hero-content p {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--color-text-secondary);
            max-width: 450px;
            margin-bottom: 2.5rem;
        }

        /* --- 5. Buttons & CTAs --- */
        .cta-group {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .btn-primary {
            position: relative;
            padding: 1rem 2rem;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: var(--color-text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color var(--transition-speed);
        }
        
        /* Animated border effect */
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0;
            background-color: var(--color-text-primary);
            z-index: -1;
            transition: width var(--transition-speed) ease-in-out;
        }

        .btn-primary:hover::before {
            width: 100%;
        }
        
        .btn-primary:hover {
            color: var(--color-bg);
            border-color: var(--color-text-primary);
        }

        .link-secondary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--color-text-secondary);
            font-weight: 600;
            transition: color var(--transition-speed);
        }
        
        .link-secondary:hover {
            color: var(--color-text-primary);
        }

        /* --- 6. Image Container & Hexagon Mask --- */
        .hero-image-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1 / 1.15; /* Maintain hexagon aspect ratio */
            justify-self: center;
        }

        .hexagon {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* The magic: CSS clip-path for a hexagon shape */
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        
        .hexagon-bg {
            background-color: var(--color-accent-light);
            z-index: 1;
        }
        
        .hexagon-border {
            background-color: #1a1d44; /* Darker border color */
            transform: scale(1.03); /* Make it slightly bigger than the bg/image */
            z-index: 2;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: relative;
            z-index: 3;
        }
        
        /* --- 7. Responsive Design --- */
        @media (max-width: 992px) {
            body {
                display: block;
                padding: 4rem 0;
            }
            .hero-section {
                text-align: center;
                gap: 4rem;
            }
            .hero-content p {
                margin-left: auto;
                margin-right: auto;
            }
            .cta-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="container hero-section">
        <div class="hero-content">
            <p class="eyebrow">ENABLING DIGITAL TRENDS</p>
            <h1>A Movement of Minds Not Just <span class="highlight">Machines</span> </h1>
            <p>Physically and virtually tangible incubator for the digitization of important areas of society in the Hildesheim region.</p>
            <div class="cta-group">
                <a href="#" class="btn-primary">Learn What We Do</a>
                <a href="#" class="link-secondary">
                    Contact us <i class='bx bx-right-top-arrow-circle'></i>
                </a>
            </div>
        </div>

        <div class="hero-image-container">
            <!-- These divs create the layered hexagon effect -->
            <div class="hexagon hexagon-bg"></div>
            <div class="hexagon hexagon-border"></div>
            
            <!-- The main image, also clipped into a hexagon -->
            <img src="https://www.library.rochester.edu/sites/default/files/styles/honeycomb_media/public/images/unnamed%20%2811%29.png?itok=mbSqtWGH" alt="Woman wearing a VR headset and interacting with a virtual space" class="hexagon hero-image">
        </div>
    </div>

</body>
</html>
