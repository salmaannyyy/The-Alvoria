<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Carousel Hero Section</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Boxicons for Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        /* --- 1. CSS Variables for Easy Theming --- */
        :root {
            --color-bg: #000000;
            --color-text-primary: #FFFFFF;
            --color-text-secondary: #c9d1d9;
            --color-border: #30363d;
            --font-family: 'Inter', sans-serif;
            --transition-speed: 0.6s;
        }

        /* --- 2. Basic Setup --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--color-bg);
            color: var(--color-text-primary);
        }

        /* --- 3. Main Hero Section --- */
        .hero-section {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* --- 4. Background Video & Overlay --- */
        .video-background-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .video-background {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.7) 30%, rgba(0,0,0,0.3) 100%);
        }

        /* --- 5. Carousel Structure --- */
        .hero-slider-track {
            display: flex;
            width: 200%; /* 100% per slide (adjust if you add more) */
            height: 100%;
            transition: transform var(--transition-speed) cubic-bezier(0.65, 0, 0.35, 1);
            position: relative;
            z-index: 2;
        }

        .hero-slide {
            width: 50%; /* 100% / number of slides */
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 8%;
        }

        /* --- 6. Slide Content & Animations --- */
        .slide-content {
            max-width: 600px;
        }
        
        /* Default state for animation */
        .slide-content > * {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        /* Staggered animation for the active slide */
        .hero-slide.active-slide .slide-title {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.2s;
        }
        .hero-slide.active-slide .slide-subtitle {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.4s;
        }
        .hero-slide.active-slide .btn {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.6s;
        }
        
        .slide-title {
            font-size: clamp(3rem, 7vw, 5.5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }
        
        .slide-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            color: var(--color-text-secondary);
            margin-bottom: 2.5rem;
            max-width: 450px;
        }
        
        .btn {
            padding: 1rem 2.5rem;
            background: none;
            border: 2px solid var(--color-text-light);
            color: var(--color-text-light);
            text-decoration: none;
            font-weight: 600;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }
        
        .btn:hover {
            background-color: var(--color-text-light);
            color: #000;
        }

        /* --- 7. Navigation & Decorative Elements --- */
        .slider-nav {
            position: absolute;
            top: 50%;
            left: 3%;
            right: 3%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        .nav-arrow {
            background: none;
            border: none;
            color: var(--color-text-primary);
            cursor: pointer;
            font-size: 3rem;
            transition: transform 0.2s ease;
        }
        
        .nav-arrow:hover {
            transform: scale(1.2);
        }

        .nav-arrow:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }
        
        .brand-icon {
            position: absolute;
            bottom: 2rem;
            left: 3%;
            width: 40px;
            height: 40px;
            background-color: #007bff;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            z-index: 10;
        }

        /* --- 8. Responsive Design --- */
        @media (max-width: 768px) {
            .hero-slide {
                padding: 0 12%;
            }
            .slider-nav {
                left: 1rem;
                right: 1rem;
            }
            .nav-arrow {
                font-size: 2.5rem;
            }
            .brand-icon {
                left: 1rem;
            }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <!-- Background Video -->
        <div class="video-background-wrapper">
            <!-- Free background video from Pexels.com -->
            <video 
                poster="https://scitechdaily.com/images/Astrophysics-Space-Dark-Matter-Concept.gif" 
                playsinline autoplay muted loop class="video-background">
                <source src="https://scitechdaily.com/images/Astrophysics-Space-Dark-Matter-Concept.gif" type="video/mp4">
            </video>
            <div class="background-overlay"></div>
        </div>
        
        <!-- Carousel Track -->
        <div class="hero-slider-track">
            <!-- Slide 1 -->
            <div class="hero-slide">
                <div class="slide-content">
                    <h1 class="slide-title">AI that dares to disrupt</h1>
                    <p class="slide-subtitle">Hyper-personalization at the pace of your thoughts.</p>
                    <a href="#" class="btn">LEARN MORE</a>
                </div>
            </div>

            <!-- Slide 2 -->
            <div class="hero-slide">
                <div class="slide-content">
                    <h1 class="slide-title">We reimagine tomorrow</h1>
                    <p class="slide-subtitle">Driving growth and molding the future through transformative change.</p>
                    <a href="#" class="btn">GET IN TOUCH</a>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="slider-nav">
            <button class="nav-arrow prev" aria-label="Previous Slide"><i class='bx bx-chevron-left'></i></button>
            <button class="nav-arrow next" aria-label="Next Slide"><i class='bx bx-chevron-right'></i></button>
        </div>
        
        <!-- Decorative Icon -->
        <div class="brand-icon">
            <i class='bx bx-check-shield'></i>
        </div>
    </section>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const track = document.querySelector('.hero-slider-track');
    const slides = Array.from(track.children);
    const nextButton = document.querySelector('.nav-arrow.next');
    const prevButton = document.querySelector('.nav-arrow.prev');

    let currentIndex = 0;
    const numSlides = slides.length;

    const goToSlide = (index) => {
        // Move the track
        track.style.transform = `translateX(-${index * (100 / numSlides)}%)`;

        // Handle active class for text animations
        slides.forEach((slide, i) => {
            slide.classList.toggle('active-slide', i === index);
        });
        
        currentIndex = index;
        updateNavButtons();
    };
    
    const updateNavButtons = () => {
        prevButton.disabled = currentIndex === 0;
        nextButton.disabled = currentIndex === numSlides - 1;
    };

    // Event Listeners
    nextButton.addEventListener('click', () => {
        if (currentIndex < numSlides - 1) {
            goToSlide(currentIndex + 1);
        }
    });

    prevButton.addEventListener('click', () => {
        if (currentIndex > 0) {
            goToSlide(currentIndex - 1);
        }
    });

    // Initial setup
    goToSlide(0);
});
</script>

</body>
</html>
